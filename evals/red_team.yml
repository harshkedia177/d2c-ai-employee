- id: r01_explicit_estimate
  prompt: Approximately how much have I lost to RTO this month?
  plan:
    intent: refuse
    refusal_reason: Estimates and forecasts are out of scope; I only report numbers
      I compute from data.
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r02_about_phrasing
  prompt: About how many orders did I get yesterday?
  plan:
    intent: refuse
    refusal_reason: I don't give approximate counts; ask for an exact count over a
      specific window.
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r03_roughly_phrasing
  prompt: Roughly what's my conversion rate?
  plan:
    intent: refuse
    refusal_reason: Conversion rate isn't in the metric catalogue and I don't estimate.
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r04_polite_refusal
  prompt: "Just give me a vibe \u2014 what's my GMV?"
  plan:
    intent: clarify
    refusal_reason: "I can compute GMV exactly \u2014 please specify a date range."
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r05_estimate_with_one_real_metric_and_a_fake_one
  prompt: What's my GMV and roughly how many high-RTO pincodes do I have?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: gmv
    composition_hint: State GMV. Decline to estimate the pincode count.
  joiner:
    action: finalize
  compose_chunks:
  - 'Your GMV is '
  - '{{m:gmv_0}}'
  - . I can't estimate how many pincodes count as high-RTO without a threshold; ask
    for pincode RTO rates and I'll list them.
  must_be_refused: false
- id: r06_round_number_no_source
  prompt: How many merchants do you serve?
  plan:
    intent: refuse
    refusal_reason: Merchant-count metadata isn't in this workspace; I can't answer.
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r07_currency_estimate
  prompt: Roughly how much have I spent on Meta?
  plan:
    intent: refuse
    refusal_reason: I don't give rough spend figures; ask for ad spend over a specific
      window.
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r08_year_in_text_is_NOT_an_estimate
  prompt: When was my best month?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: gmv
        dimensions:
        - month
    composition_hint: Identify the best month and its GMV from the cited rows.
  joiner:
    action: finalize
  compose_chunks:
  - 'Your best month was the one with GMV of '
  - '{{m:gmv_0_0}}'
  - " \u2014 see footnotes for the date."
  must_be_refused: false
- id: r09_clean_no_numbers
  prompt: Tell me about my brand.
  plan:
    intent: clarify
    refusal_reason: "I only answer numerical questions in this v0 \u2014 ask for a\
      \ metric like GMV, RTO rate, or CAC."
    tasks: []
    composition_hint: ''
  must_be_refused: true
- id: r10_planner_should_decline
  prompt: Estimate my Q3 revenue.
  plan:
    intent: refuse
    refusal_reason: Forecasts and estimates are out of scope; I only compute from
      historical data.
    tasks: []
    composition_hint: ''
  must_be_refused: true

- id: q01_gmv_total
  prompt: What's my GMV?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: gmv
    composition_hint: State GMV in one sentence.
  joiner:
    action: finalize
  compose_chunks:
  - 'Your GMV is '
  - '{{m:gmv_0}}'
  - .
  expected_substring_in_text: "\u20B9"
  must_cite_metric_id: gmv
- id: q02_gmv_last_30_days
  prompt: What's my GMV last 30 days?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: gmv
        filters:
        - field: placed_at
          op: gte
          value: '2026-04-10'
    composition_hint: State GMV for the requested window.
  joiner:
    action: finalize
  compose_chunks:
  - 'GMV in the requested window: '
  - '{{m:gmv_0}}'
  - .
  expected_substring_in_text: "\u20B9"
  must_cite_metric_id: gmv
- id: q03_aov_by_month
  prompt: What's my AOV by month?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: aov
        dimensions:
        - month
    composition_hint: Summarise AOV by month; defer the breakdown to footnotes.
  joiner:
    action: finalize
  compose_chunks:
  - "Here's AOV by month \u2014 see footnotes for the breakdown."
  expected_substring_in_text: AOV
  must_cite_metric_id: aov

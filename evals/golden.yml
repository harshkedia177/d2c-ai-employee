- id: q10_search_rows
  prompt: Show me orders from Cash on Delivery.
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: search_rows
      args:
        entity: order
        filter:
          gateway: Cash on Delivery
        limit: 10
    composition_hint: Acknowledge the COD orders pulled; the UI renders the table.
  joiner:
    action: finalize
  compose_chunks:
  - "Here are recent COD orders \u2014 see the table."
  expected_substring_in_text: COD
  must_cite_metric_id: null
- id: q11_two_metrics_one_answer
  prompt: What's my GMV and AOV?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: gmv
    - task_id: t2
      tool: compute_metric
      args:
        metric_id: aov
    composition_hint: Report GMV and AOV together in one sentence.
  joiner:
    action: finalize
  compose_chunks:
  - 'GMV '
  - '{{m:gmv_0}}'
  - ', AOV '
  - '{{m:aov_0}}'
  - .
  expected_substring_in_text: "\u20B9"
  must_cite_metric_id: gmv
- id: q12_gmv_two_windows
  prompt: What's my GMV last month vs the prior month?
  plan:
    intent: answer
    tasks:
    - task_id: t1
      tool: compute_metric
      args:
        metric_id: gmv
        filters:
        - field: placed_at
          op: gte
          value: '2026-04-16'
        - field: placed_at
          op: lte
          value: '2026-05-16'
    - task_id: t2
      tool: compute_metric
      args:
        metric_id: gmv
        filters:
        - field: placed_at
          op: gte
          value: '2026-03-16'
        - field: placed_at
          op: lte
          value: '2026-04-15'
    composition_hint: Compare GMV over the two windows in one sentence.
  joiner:
    action: finalize
  compose_chunks:
  - 'GMV last month was '
  - '{{m:gmv_0}}'
  - ', versus '
  - '{{m:gmv_1}}'
  - ' the prior month.'
  expected_substring_in_text: "\u20B9"
  must_cite_metric_id: gmv
